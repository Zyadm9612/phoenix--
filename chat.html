<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Phoenix · Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
     
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text-primary); line-height: 1.5;
      transition: background 0.3s, color 0.2s; display: flex; flex-direction: column;
      overflow: hidden; height: 100%; min-height: 100dvh;
    }
    :root {
      --bg: #f9fafc; --surface: #ffffff; --text-primary: #1e1e2f; --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c; --accent-2: #ff6b2b; --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --border: #eaeef2; --shadow: 0 20px 30px -10px rgba(0,0,0,0.05); --glow: rgba(255,110,64,0.4);
      --navbar-bg: rgba(255,255,255,0.8); --sent-bg: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --received-bg: #ffffff; --input-bg: #f5f5f5;
    }
    body.dark {
      --bg: #12121a; --surface: #1e1e2a; --text-primary: #f0f0fa; --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e; --accent-2: #ff7b3f; --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --border: #333344; --shadow: 0 20px 30px -10px rgba(0,0,0,0.7); --glow: rgba(255,140,80,0.6);
      --navbar-bg: rgba(30,30,42,0.9); --sent-bg: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --received-bg: #2a2a3c; --input-bg: #252533;
    }
    .nav-mini {
      display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1.2rem;
      background: var(--navbar-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 0.8rem;
    }
    .nav-left { display: flex; align-items: center; gap: 0.8rem; }
    .hamburger { background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; display: none; width: 40px; height: 40px; border-radius: 50%; align-items: center; justify-content: center; transition: background 0.2s; }
    .logo-area { display: flex; align-items: center; gap: 0.5rem; }
    .logo-area img { height: 44px; width: auto; border-radius: 10px; }
    .logo-text h2 { font-size: 1.4rem; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo-text span { font-size: 0.7rem; color: var(--text-secondary); display: block; }
    .nav-right { display: flex; align-items: center; gap: 0.6rem; }
    .nav-icon, .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.3rem; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .chat-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .chat-sidebar {
      width: 340px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.25s ease;
    }
    .sidebar-header { padding: 1.2rem 1rem; border-bottom: 1px solid var(--border); }
    .sidebar-header h3 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem; }
    .search-box { position: relative; }
    .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.9rem; }
    .search-box input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.4rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 30px; color: var(--text-primary); font-size: 0.9rem; outline: none; }
    .search-box input:focus { border-color: var(--accent-1); }
    .conversation-list { flex: 1; overflow-y: auto; }
    .conversation-item {
      display: flex; align-items: center; gap: 0.8rem; padding: 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.2s;
    }
    .conversation-item:hover { background: rgba(255,138,76,0.05); }
    .conversation-item.active { background: rgba(255,138,76,0.12); border-left: 4px solid var(--accent-1); }
    .conv-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-1); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.1rem; flex-shrink: 0; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.2rem; }
    .conv-name { font-weight: 600; }
    .conv-time { font-size: 0.7rem; color: var(--text-secondary); }
    .conv-lastmsg { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-badge { background: var(--accent-1); color: white; border-radius: 12px; min-width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; padding: 0 5px; margin-left: 6px; }
    .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; min-height: 0; position: relative; }
    .chat-header { padding: 0.8rem 1.2rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.8rem; flex-shrink: 0; }
    .mobile-back-btn { background: none; border: none; color: var(--accent-1); font-size: 1.4rem; cursor: pointer; display: none; margin-right: 0.3rem; padding: 0.4rem; border-radius: 50%; }
    .chat-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-1); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.1rem; flex-shrink: 0; }
    .chat-header-info h3 { font-size: 1.1rem; font-weight: 600; }
    .chat-header-info p { font-size: 0.75rem; color: var(--text-secondary); }
    .chat-messages { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 1rem 1rem 0.5rem 1rem; display: flex; flex-direction: column; gap: 0.8rem; overflow-x: hidden; }
    .message-bubble { max-width: 70%; padding: 0.7rem 1rem; border-radius: 18px; word-wrap: break-word; overflow-wrap: break-word; white-space: normal; word-break: break-word; box-shadow: 0 2px 6px rgba(0,0,0,0.05); line-height: 1.4; font-size: 0.9rem; }
    .message-bubble.sent { background: var(--sent-bg); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
    .message-bubble.received { background: var(--received-bg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 5px; }
    .message-time { font-size: 0.6rem; opacity: 0.7; margin-top: 0.3rem; text-align: right; }
    .message-image { max-width: 100%; max-height: 220px; width: auto; height: auto; border-radius: 14px; margin-bottom: 0.3rem; cursor: pointer; object-fit: cover; display: block; }
    .message-file { display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.05); padding: 0.5rem; border-radius: 12px; margin-bottom: 0.3rem; word-break: break-all; }
    .message-file i { font-size: 1.5rem; color: var(--accent-1); }
    .message-file a { color: var(--text-primary); text-decoration: none; font-weight: 500; }
    .typing-indicator { align-self: flex-start; background: var(--received-bg); border: 1px solid var(--border); padding: 0.7rem 1rem; border-radius: 18px; border-bottom-left-radius: 5px; display: inline-flex; align-items: center; gap: 0.2rem; color: var(--text-secondary); font-style: italic; font-size: 0.85rem; }
    .typing-indicator i { font-size: 0.5rem; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
    .chat-input-area { padding: 0.8rem 1rem; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; padding-bottom: max(0.8rem, env(safe-area-inset-bottom)); }
    .chat-input-area input { flex: 1; min-width: 0; padding: 0.7rem 1rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 30px; color: var(--text-primary); font-size: 0.95rem; outline: none; }
    .chat-input-area input:focus { border-color: var(--accent-1); }
    .chat-input-area button, .attach-btn { background: var(--gradient); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px var(--glow); transition: transform 0.2s; flex-shrink: 0; }
    .attach-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; padding: 2rem; }
    .empty-state i { font-size: 3.5rem; color: var(--accent-1); opacity: 0.6; margin-bottom: 1rem; }
    .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
    .lightbox .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 2rem; cursor: pointer; background: rgba(0,0,0,0.5); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .chat-sidebar { position: absolute; top: 0; left: 0; bottom: 0; width: 85%; max-width: 320px; z-index: 30; transform: translateX(-100%); box-shadow: 2px 0 20px rgba(0,0,0,0.2); }
      .chat-sidebar.sidebar-visible { transform: translateX(0); }
      .mobile-back-btn { display: block; }
      .message-bubble { max-width: 85%; font-size: 0.85rem; padding: 0.6rem 0.9rem; }
    }
    @media (min-width: 769px) { .chat-sidebar { position: relative; transform: none !important; } .hamburger { display: none; } }
  </style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <span class="close-lightbox" id="closeLightbox">&times;</span>
  <img id="lightboxImg" src="" alt="Preview">
</div>

<div class="nav-mini">
  <div class="nav-left">
    <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
    <div class="logo-area">
      <img src="assets/images/photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
      <div class="logo-text"><h2>Phoenix</h2><span>donate & trade</span></div>
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-icon" id="notificationsBtn"><i class="fas fa-bell"></i></button>
    <a href="profile.html" class="nav-icon" id="profileBtn" style="text-decoration:none;"><i class="fas fa-user-circle"></i></a>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </div>
</div>

<div class="chat-layout">
  <div class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-header">
      <h3>Messages</h3>
      <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search conversations..."></div>
    </div>
    <div class="conversation-list" id="conversationList"></div>
  </div>

  <div class="chat-main" id="chatMain">
    <div class="empty-state" id="emptyState">
      <i class="far fa-comments"></i>
      <h3>Select a conversation</h3>
      <p>Choose a contact to start messaging</p>
    </div>
    <div id="chatContent" style="display: none; flex-direction: column; height: 100%; min-height: 0;">
      <div class="chat-header">
        <button class="mobile-back-btn" id="mobileBackBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-avatar" id="activeAvatar">?</div>
        <div class="chat-header-info">
          <h3 id="activeName">Select contact</h3>
          <p id="activeProduct"></p>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
        <input type="file" id="fileInput" accept="image/*,application/pdf,.doc,.docx,.txt" style="display: none;" multiple>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ---------- API Configuration ----------
  const API_BASE_URL = 'https://your-backend.com/api';      
  const CONVERSATIONS_URL = `${API_BASE_URL}/conversations`;
  const MESSAGES_URL = `${API_BASE_URL}/messages`;

  // ---------- Auth helpers ----------
  function getToken() { return localStorage.getItem('phoenix_token'); }
  function authHeaders() {
    const token = getToken();
    return {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {})
    };
  }

  // ---------- Check authentication ----------
  // const token = getToken();
  // if (!token) {
  //   window.location.href = 'sign.html';
  //   return;
  // }

  // ---------- Global state ----------
  let conversations = [];
  let activeConversationId = null;
  let pollingInterval = null;
  let typingTimeout = null;
  let currentUser = null; // will be fetched from /auth/me

  // ---------- DOM elements ----------
  const sidebarEl = document.getElementById('chatSidebar');
  const convListEl = document.getElementById('conversationList');
  const emptyState = document.getElementById('emptyState');
  const chatContent = document.getElementById('chatContent');
  const chatMessagesDiv = document.getElementById('chatMessages');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendMessageBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const activeName = document.getElementById('activeName');
  const activeAvatar = document.getElementById('activeAvatar');
  const activeProduct = document.getElementById('activeProduct');
  const searchInput = document.getElementById('searchInput');
  const mobileBackBtn = document.getElementById('mobileBackBtn');
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const notificationsBtn = document.getElementById('notificationsBtn');
  const profileBtn = document.getElementById('profileBtn');
  const themeToggle = document.getElementById('themeToggle');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const closeLightbox = document.getElementById('closeLightbox');

  // ---------- Dark mode ----------
  const body = document.body;
  if (localStorage.getItem('phoenix-theme') === 'dark') {
    body.classList.add('dark');
    themeToggle.querySelector('i').className = 'fas fa-sun';
  }
  themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark');
    const isDark = body.classList.contains('dark');
    themeToggle.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    localStorage.setItem('phoenix-theme', isDark ? 'dark' : 'light');
  });

  // ---------- Lightbox ----------
  function showLightbox(src) { lightboxImg.src = src; lightbox.style.display = 'flex'; }
  closeLightbox.addEventListener('click', () => lightbox.style.display = 'none');
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.style.display = 'none'; });
  window.showLightbox = showLightbox;

  // ---------- Sidebar toggle ----------
  function toggleSidebar() { if (window.innerWidth <= 768) sidebarEl.classList.toggle('sidebar-visible'); }
  hamburgerBtn.addEventListener('click', toggleSidebar);

  // ---------- Fetch current user ----------
  async function fetchCurrentUser() {
    try {
      const res = await fetch(`${API_BASE_URL}/auth/me`, { headers: authHeaders() });
      if (!res.ok) throw new Error('Failed to fetch user');
      const user = await res.json();
      currentUser = user;
      return user;
    } catch (err) {
      console.error('Error fetching user:', err);
      return null;
    }
  }

  // ---------- Conversations API ----------
  async function fetchConversations() {
    try {
      const res = await fetch(CONVERSATIONS_URL, { headers: authHeaders() });
      if (!res.ok) throw new Error('Failed to fetch conversations');
      conversations = await res.json();
      renderConversationList();
      return conversations;
    } catch (err) {
      console.error(err);
      conversations = [];
      renderConversationList();
    }
  }

  async function createOrGetConversation(sellerId, sellerName, productTitle, productId) {
    try {
      const res = await fetch(CONVERSATIONS_URL, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ sellerId, sellerName, productTitle, productId })
      });
      if (!res.ok) throw new Error('Failed to create conversation');
      const conv = await res.json();
      // refresh conversations list
      await fetchConversations();
      return conv;
    } catch (err) {
      console.error(err);
      return null;
    }
  }

  // ---------- Messages API ----------
  async function fetchMessages(conversationId) {
    try {
      const res = await fetch(`${MESSAGES_URL}?conversationId=${conversationId}`, { headers: authHeaders() });
      if (!res.ok) throw new Error('Failed to fetch messages');
      const messages = await res.json();
      return messages;
    } catch (err) {
      console.error(err);
      return [];
    }
  }

  async function sendMessage(conversationId, content, type = 'text', fileName = null, fileData = null) {
    const payload = { conversationId, content, type };
    if (fileName) payload.fileName = fileName;
    if (fileData) payload.fileData = fileData; // base64 or URL
    try {
      const res = await fetch(MESSAGES_URL, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Failed to send message');
      const newMsg = await res.json();
      return newMsg;
    } catch (err) {
      console.error(err);
      alert('Error sending message: ' + err.message);
      return null;
    }
  }

  async function markConversationRead(conversationId) {
    try {
      await fetch(`${CONVERSATIONS_URL}/${conversationId}/read`, { method: 'PUT', headers: authHeaders() });
    } catch (err) { console.warn('Failed to mark read', err); }
  }

  // ---------- Render conversation list ----------
  function renderConversationList(filterText = '') {
    const filtered = conversations.filter(c =>
      c.otherParticipant.name.toLowerCase().includes(filterText.toLowerCase()) ||
      (c.productTitle && c.productTitle.toLowerCase().includes(filterText.toLowerCase()))
    );
    convListEl.innerHTML = filtered.map(conv => `
      <div class="conversation-item ${activeConversationId === conv.id ? 'active' : ''}" data-id="${conv.id}">
        <div class="conv-avatar">${conv.otherParticipant.avatar || conv.otherParticipant.name.charAt(0).toUpperCase()}</div>
        <div class="conv-info">
          <div class="conv-name-row">
            <span class="conv-name">${escapeHtml(conv.otherParticipant.name)}</span>
            <span class="conv-time">${formatRelativeTime(conv.lastMessageTime)}</span>
          </div>
          <div class="conv-lastmsg">
            ${escapeHtml(conv.lastMessage || 'Start messaging...')}
            ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.conversation-item').forEach(item => {
      item.addEventListener('click', () => openConversation(parseInt(item.dataset.id)));
    });
  }

  function formatRelativeTime(isoString) {
    if (!isoString) return '';
    const date = new Date(isoString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return `${diffMins}m ago`;
    if (diffHours < 24) return `${diffHours}h ago`;
    return `${diffDays}d ago`;
  }

  // ---------- Open conversation ----------
  async function openConversation(id) {
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    activeConversationId = id;
    activeName.textContent = conv.otherParticipant.name;
    activeAvatar.textContent = conv.otherParticipant.avatar || conv.otherParticipant.name.charAt(0).toUpperCase();
    activeProduct.innerHTML = `<i class="fas fa-tag"></i> ${conv.productTitle || 'General'}`;
    emptyState.style.display = 'none';
    chatContent.style.display = 'flex';
    messageInput.disabled = false;
    sendBtn.disabled = false;
    attachBtn.disabled = false;
    // mark read
    await markConversationRead(id);
    // fetch messages
    const messages = await fetchMessages(id);
    renderMessages(messages);
    // update unread count locally
    conv.unreadCount = 0;
    renderConversationList(searchInput.value);
    if (window.innerWidth <= 768) sidebarEl.classList.remove('sidebar-visible');
    setTimeout(() => chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight, 50);
    // start polling for new messages every 5 seconds
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
      if (activeConversationId) {
        const newMessages = await fetchMessages(activeConversationId);
        // only update if we have new ones (simple length check)
        const currentMsgCount = chatMessagesDiv.querySelectorAll('.message-bubble').length;
        if (newMessages.length > currentMsgCount) {
          renderMessages(newMessages);
          chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
      }
    }, 5000);
  }

  function renderMessages(messages) {
    if (!messages) return;
    chatMessagesDiv.innerHTML = messages.map(msg => {
      const isSent = msg.senderId === currentUser?.id;
      if (msg.type === 'image') {
        return `<div class="message-bubble ${isSent ? 'sent' : 'received'}">
                  <img src="${msg.content}" class="message-image" onclick="showLightbox('${msg.content}')" onerror="this.style.display='none'">
                  <div class="message-time">${formatTime(msg.createdAt)}</div>
                </div>`;
      } else if (msg.type === 'file') {
        return `<div class="message-bubble ${isSent ? 'sent' : 'received'}">
                  <div class="message-file"><i class="fas fa-file"></i><a href="${msg.content}" download="${msg.fileName || 'file'}">${msg.fileName || 'Download file'}</a></div>
                  <div class="message-time">${formatTime(msg.createdAt)}</div>
                </div>`;
      } else {
        return `<div class="message-bubble ${isSent ? 'sent' : 'received'}">
                  ${escapeHtml(msg.content)}
                  <div class="message-time">${formatTime(msg.createdAt)}</div>
                </div>`;
      }
    }).join('');
    // Re-attach image click handlers
    document.querySelectorAll('.message-image').forEach(img => {
      img.addEventListener('click', (e) => { e.stopPropagation(); showLightbox(img.src); });
    });
  }

  function formatTime(isoString) {
    if (!isoString) return '';
    const date = new Date(isoString);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ---------- Send message ----------
  async function handleSendMessage() {
    const text = messageInput.value.trim();
    if (!text || !activeConversationId) return;
    // optimistic add
    const tempMsg = { id: 'temp', content: text, type: 'text', senderId: currentUser?.id, createdAt: new Date().toISOString() };
    const currentMessages = [...(window._currentMessages || [])];
    currentMessages.push(tempMsg);
    window._currentMessages = currentMessages;
    renderMessages(currentMessages);
    messageInput.value = '';
    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    // send to backend
    const sent = await sendMessage(activeConversationId, text, 'text');
    if (sent) {
      // refresh messages
      const freshMessages = await fetchMessages(activeConversationId);
      window._currentMessages = freshMessages;
      renderMessages(freshMessages);
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
      // update conversation list (last message)
      await fetchConversations();
    } else {
      // rollback optimistic
      renderMessages(window._currentMessages || []);
      alert('Failed to send message');
    }
  }

  // ---------- Attachments ----------
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length || !activeConversationId) return;
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result;
          await sendMessage(activeConversationId, base64, 'image', file.name);
          // refresh messages
          const fresh = await fetchMessages(activeConversationId);
          window._currentMessages = fresh;
          renderMessages(fresh);
          chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
          await fetchConversations();
        };
        reader.readAsDataURL(file);
      } else {
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result;
          await sendMessage(activeConversationId, base64, 'file', file.name);
          const fresh = await fetchMessages(activeConversationId);
          window._currentMessages = fresh;
          renderMessages(fresh);
          chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
          await fetchConversations();
        };
        reader.readAsDataURL(file);
      }
    }
    fileInput.value = '';
  });

  // ---------- Handle URL params (opening chat from product page) ----------
  async function handleUrlParams() {
    const params = new URLSearchParams(window.location.search);
    const sellerId = params.get('seller_id');
    const productTitle = params.get('product_title');
    const productId = params.get('product_id');
    if (sellerId) {
      // check if conversation already exists
      let existing = conversations.find(c => c.otherParticipant.id == sellerId);
      if (!existing) {
        const sellerName = params.get('seller_name') || `User_${sellerId.slice(0,5)}`;
        const newConv = await createOrGetConversation(sellerId, sellerName, productTitle, productId);
        if (newConv) {
          await fetchConversations();
          existing = conversations.find(c => c.id === newConv.id);
        }
      }
      if (existing) {
        openConversation(existing.id);
      }
    }
  }

  // ---------- Notifications & Profile buttons ----------
  notificationsBtn.addEventListener('click', () => window.location.href = 'notifications.html');
  profileBtn.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'profile.html'; });

  // ---------- Mobile back ----------
  mobileBackBtn.addEventListener('click', () => {
    if (window.innerWidth <= 768) {
      sidebarEl.classList.add('sidebar-visible');
      chatContent.style.display = 'none';
      emptyState.style.display = 'flex';
      activeConversationId = null;
      if (pollingInterval) clearInterval(pollingInterval);
      renderConversationList(searchInput.value);
    }
  });

  // ---------- Search ----------
  searchInput.addEventListener('input', (e) => renderConversationList(e.target.value));
  sendBtn.addEventListener('click', handleSendMessage);
  messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });

  // ---------- Escape HTML ----------
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  // ---------- Initialization ----------
  async function init() {
    await fetchCurrentUser();
    await fetchConversations();
    await handleUrlParams();
    if (!activeConversationId) {
      emptyState.style.display = 'flex';
      chatContent.style.display = 'none';
      attachBtn.disabled = true;
    } else {
      emptyState.style.display = 'none';
      chatContent.style.display = 'flex';
    }
    if (window.innerWidth <= 768) sidebarEl.classList.remove('sidebar-visible');
  }
  init();

  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) sidebarEl.classList.remove('sidebar-visible');
    else if (!activeConversationId) sidebarEl.classList.remove('sidebar-visible');
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Phoenix · Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* نفس الستايلات السابقة (بدون تغيير) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg: #f9f9f9;
            --surface: #ffffff;
            --text-primary: #1e1e2f;
            --text-secondary: #4a4a5e;
            --accent-1: #ff8a4c;
            --accent-2: #ff6b2b;
            --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
            --border-light: #ddd;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --glow: rgba(255, 110, 64, 0.4);
            --input-bg: #ffffff;
            --card-bg: #ffffff;
            --navbar-bg: rgba(255, 255, 255, 0.9);
            --error: #e53e3e;
            --success: #2ecc71;
        }
        body.dark {
            --bg: #12121a;
            --surface: #1e1e2a;
            --text-primary: #f0f0fa;
            --text-secondary: #b0b0c0;
            --accent-1: #ff9f6e;
            --accent-2: #ff7b3f;
            --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
            --border-light: #3a3a4a;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --glow: rgba(255, 140, 80, 0.5);
            --input-bg: #252533;
            --card-bg: #1e1e2a;
            --navbar-bg: rgba(30, 30, 42, 0.9);
            --error: #fc8181;
            --success: #68d391;
        }
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.2s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav-mini {
            display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem;
            background: var(--navbar-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light);
        }
        .nav-mini .logo-area { display: flex; align-items: center; gap: 0.5rem; }
        .nav-mini .logo-area img { height: 52px; width: auto; border-radius: 12px; }
        .nav-mini .logo-text h2 {
            font-size: 1.5rem; font-weight: 700; background: var(--gradient);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .nav-mini .logo-text span { font-size: 0.8rem; color: var(--text-secondary); }
        .nav-mini .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.3rem; cursor: pointer; }
        .container {
            display: flex; flex: 1; align-items: center; justify-content: center; padding: 2rem;
        }
        .card {
            max-width: 480px; width: 100%; background: var(--card-bg); border-radius: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--border-light); padding: 2.5rem 2rem;
        }
        .card h3 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card .subhead { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-secondary); font-size: 0.95rem; }
        .input-group input {
            width: 100%; padding: 0.9rem 1.2rem; background: var(--input-bg); border: 1px solid var(--border-light);
            border-radius: 15px; font-size: 1rem; color: var(--text-primary); transition: 0.2s;
        }
        .input-group input:focus {
            outline: none; border-color: var(--accent-1); box-shadow: 0 0 0 3px var(--glow);
        }
        .btn-primary {
            width: 100%; background: var(--gradient); color: white; border: none; padding: 0.9rem;
            border-radius: 15px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: 0.25s; box-shadow: 0 4px 14px var(--glow); margin-bottom: 1.5rem;
        }
        .btn-primary:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 25px var(--glow); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .back-link { text-align: center; color: var(--text-secondary); }
        .back-link a { color: var(--accent-1); font-weight: 500; text-decoration: none; }
        .footer-note { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: var(--text-secondary); }
        .message {
            background: var(--surface); border: 1px solid var(--border-light); border-radius: 15px; padding: 1rem;
            margin-top: 1rem; text-align: center; display: none;
        }
        .message.success { display: block; background: rgba(46,204,113,0.1); color: var(--success); border-color: var(--success); }
        .message.error { display: block; background: rgba(229,62,62,0.1); color: var(--error); border-color: var(--error); }
        .spinner { width: 1.2rem; height: 1.2rem; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-left: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .card { padding: 1.8rem 1.2rem; }
            .nav-mini { padding: 0.8rem 1rem; }
            .nav-mini .logo-area img { height: 44px; }
            .nav-mini .logo-text h2 { font-size: 1.3rem; }
            .nav-mini .logo-text span { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="nav-mini">
        <div class="logo-area">
            <img src="assets/images/photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
            <div class="logo-text"><h2>Phoenix</h2><span>donate & trade</span></div>
        </div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>

    <div class="container">
        <div class="card">
            <h3>Forgot Password?</h3>
            <div class="subhead">Enter your email and we'll send you a reset link.</div>

            <form id="forgotForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="hello@phoenix.exchange" required autocomplete="email">
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="submitText">Send Reset Link</span>
                    <span id="submitSpinner" class="spinner" style="display: none;"></span>
                </button>
                <div id="message" class="message"></div>
            </form>

            <div class="back-link"><a href="sign.html">← Back to Sign In</a></div>
            <div class="footer-note">Phoenix Exchange System © 2026</div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- Dark Mode ----------
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = themeToggle.querySelector('i');
            function applyTheme(isDark) {
                document.body.classList.toggle('dark', isDark);
                themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('phoenix-theme', isDark ? 'dark' : 'light');
            }
            applyTheme(localStorage.getItem('phoenix-theme') === 'dark');
            themeToggle.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));

            // ---------- API Configuration ----------
            const API_BASE_URL = 'https://backend.com/api';   
            const FORGOT_PASSWORD_URL = `${API_BASE_URL}/auth/forgot-password`;

            const form = document.getElementById('forgotForm');
            const emailInput = document.getElementById('email');
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');
            const messageDiv = document.getElementById('message');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim().toLowerCase();
                if (!email) return;

                // Clear previous message
                messageDiv.className = 'message';
                messageDiv.style.display = 'none';
                messageDiv.innerHTML = '';

                // Show loading
                submitBtn.disabled = true;
                submitText.textContent = 'Sending...';
                submitSpinner.style.display = 'inline-block';

                try {
                    const response = await fetch(FORGOT_PASSWORD_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message || 'Failed to send reset link');

                    // Success
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    messageDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${data.message || 'Reset link sent to your email.'}`;
                    // Optionally, store reset email or token for next step  
                    localStorage.setItem('resetEmail', email);
                    // Redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'reset-password.html';
                    }, 3000);
                } catch (err) {
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    messageDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message}`;
                } finally {
                    submitBtn.disabled = false;
                    submitText.textContent = 'Send Reset Link';
                    submitSpinner.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>

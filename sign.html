<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Phoenix · Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
     
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    :root {
      --bg: #f5f7fa; --surface: #ffffff; --text-primary: #1e1e2f; --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c; --accent-2: #ff6b2b; --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --border-light: #ddd; --shadow: 0 10px 30px rgba(0,0,0,0.05); --glow: rgba(255,110,64,0.4);
      --input-bg: #ffffff; --card-bg: #ffffff; --navbar-bg: rgba(255,255,255,0.9);
      --error: #e53e3e; --error-bg: #fee2e2;
    }
    body.dark {
      --bg: #12121a; --surface: #1e1e2a; --text-primary: #f0f0fa; --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e; --accent-2: #ff7b3f; --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --border-light: #3a3a4a; --shadow: 0 10px 30px rgba(0,0,0,0.4); --glow: rgba(255,140,80,0.5);
      --input-bg: #252533; --card-bg: #1e1e2a; --navbar-bg: rgba(30,30,42,0.9);
      --error: #fc8181; --error-bg: #3a2a2a;
    }
    body { background-color: var(--bg); color: var(--text-primary); line-height: 1.5; transition: background-color 0.3s, color 0.2s; min-height: 100vh; display: flex; flex-direction: column; }
    .nav-mini { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--navbar-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); }
    .logo-area { display: flex; align-items: center; gap: 0.5rem; }
    .logo-area img { height: 52px; width: auto; border-radius: 12px; }
    .logo-text h2 { font-size: 1.5rem; font-weight: 700; background: var(--gradient); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logo-text span { font-size: 0.8rem; color: var(--text-secondary); }
    .nav-right { display: flex; gap: 1.5rem; }
    .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.3rem; cursor: pointer; }
    .signin-container { flex:1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .signin-card { max-width: 480px; width:100%; background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-light); padding: 2rem; transition: transform 0.2s; }
    .signin-card:hover { transform: translateY(-4px); }
    .form-side h3 { font-size: 2rem; font-weight: 700; background: var(--gradient); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 0.5rem; }
    .subhead { color: var(--text-secondary); margin-bottom: 1.8rem; font-size: 0.95rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-secondary); }
    .input-field { width: 100%; padding: 0.9rem 1.2rem; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 15px; font-size: 1rem; color: var(--text-primary); transition: 0.2s; }
    .input-field:focus { outline: none; border-color: var(--accent-1); box-shadow: 0 0 0 3px var(--glow); }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper .input-field { padding-right: 3rem; }
    .password-toggle { position: absolute; right: 1.2rem; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem; }
    .row-options { display: flex; justify-content: space-between; align-items: center; margin: 0.5rem 0 1rem; font-size: 0.95rem; }
    .remember { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); cursor: pointer; }
    .remember input { accent-color: var(--accent-1); }
    .forgot a { color: var(--accent-1); text-decoration: none; font-weight: 500; }
    .forgot a:hover { text-decoration: underline; }
    .error-message { background: var(--error-bg); color: var(--error); font-size: 0.9rem; padding: 0.8rem; border-radius: 15px; margin: 0 0 1rem; display: flex; align-items: center; gap: 0.6rem; opacity: 0; transform: translateY(-8px); transition: 0.2s; border: 1px solid var(--error); }
    .error-message.show { opacity: 1; transform: translateY(0); }
    .btn-signin { width:100%; background: var(--gradient); color: white; border: none; padding: 0.9rem; border-radius: 15px; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 12px var(--glow); transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
    .btn-signin:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 20px var(--glow); }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner { width: 1.2rem; height: 1.2rem; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .or-divider { text-align: center; position: relative; margin: 1rem 0; }
    .or-divider span { background: var(--card-bg); padding: 0 1rem; color: var(--text-secondary); font-size: 0.85rem; position: relative; z-index: 2; }
    .or-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-light); z-index: 1; }
    .google-btn { width:100%; background: transparent; border: 1px solid var(--border-light); padding: 0.9rem; border-radius: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.8rem; cursor: pointer; transition: 0.2s; color: var(--text-primary); margin-bottom: 1rem; }
    .google-btn:hover { background: var(--surface); border-color: var(--accent-1); }
    .google-btn img { width: 1.2rem; }
    .create-account { text-align: center; color: var(--text-secondary); margin-top: 0.5rem; }
    .create-account a { color: var(--accent-1); font-weight: 600; text-decoration: none; }
    .footer-note { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: var(--text-secondary); }
    @media (max-width: 768px) { .nav-mini { padding: 0.8rem 1rem; } .signin-card { padding: 1.5rem; } .input-field { padding: 0.8rem 1rem; } }
  </style>
</head>
<body>

<div class="nav-mini">
  <div class="logo-area">
    <img src="assets/images/photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
    <div class="logo-text"><h2>Phoenix</h2><span>donate & trade</span></div>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </div>
</div>

<div class="signin-container">
  <div class="signin-card">
    <div class="form-side">
      <h3>Sign In</h3>
      <div class="subhead">Access your account to donate or sell items.</div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" class="input-field" placeholder="hello@phoenix.exchange" autocomplete="email" autofocus>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="input-field" placeholder="8+ characters" autocomplete="current-password">
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
            <i class="far fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <div class="row-options">
        <label class="remember"><input type="checkbox" id="rememberMe"> Remember me</label>
        <div class="forgot"><a href="forgot-password.html">Forgot Password?</a></div>
      </div>

      <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <button class="btn-signin" id="signinButton"><span>Sign In</span></button>

      <div class="or-divider"><span>OR</span></div>
      <button class="google-btn" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
        Continue with Google
      </button>
      <div class="create-account">Don't have an account? <a href="create-account.html">Create an Account</a></div>
      <div class="footer-note">Phoenix Exchange System © 2026</div>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- Dark Mode ----------
    const themeToggle = document.getElementById('themeToggle');
    const root = document.body;
    function setTheme(isDark) {
      root.classList.toggle('dark', isDark);
      themeToggle.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('phoenix-theme', isDark ? 'dark' : 'light');
    }
    setTheme(localStorage.getItem('phoenix-theme') === 'dark');
    themeToggle.addEventListener('click', () => setTheme(!root.classList.contains('dark')));

    // ---------- Elements ----------
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const signinBtn     = document.getElementById('signinButton');
    const errorDiv      = document.getElementById('errorMessage');
    const errorSpan     = document.getElementById('errorText');
    const rememberCheck = document.getElementById('rememberMe');

    // ---------- API Configuration   ----------
    const API_BASE_URL = 'https://backend.com/api';     
    const LOGIN_ENDPOINT = `${API_BASE_URL}/auth/login`;

    // Helper: show error
    let errorTimeout;
    function showError(msg) {
      errorSpan.innerText = msg;
      errorDiv.classList.add('show');
      if (errorTimeout) clearTimeout(errorTimeout);
      errorTimeout = setTimeout(() => errorDiv.classList.remove('show'), 4500);
    }

    // Password toggle
    document.getElementById('togglePassword').addEventListener('click', function() {
      const show = passwordInput.type === 'password';
      passwordInput.type = show ? 'text' : 'password';
      this.querySelector('i').className = show ? 'far fa-eye' : 'far fa-eye-slash';
    });

    // Loading state
    function setLoading(loading) {
      signinBtn.disabled = loading;
      signinBtn.innerHTML = loading
        ? '<span class="spinner"></span> Signing in...'
        : '<span>Sign In</span>';
    }

    // ---------- Login function (real backend) ----------
    async function login(email, password) {
      const response = await fetch(LOGIN_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'Login failed. Please check your credentials.');
      }
      return data; // expected: { token, user: { id, name, email, firstName, lastName, ... } }
    }

    // Handle sign in
    signinBtn.addEventListener('click', async () => {
      errorDiv.classList.remove('show');
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) return showError('Please enter email and password.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('Enter a valid email address.');

      setLoading(true);
      try {
        const result = await login(email, password);
        // Store token and user data
        localStorage.setItem('phoenix_token', result.token);
        localStorage.setItem('phoenix_user', JSON.stringify(result.user));
        localStorage.setItem('currentUser', JSON.stringify(result.user));
        if (rememberCheck.checked) {
          localStorage.setItem('phoenix_remembered_email', email);
        } else {
          localStorage.removeItem('phoenix_remembered_email');
        }
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message || 'Login failed. Please try again.');
        setLoading(false);
      }
    });

    // Enter key submission
    const handleEnter = (e) => { if (e.key === 'Enter') signinBtn.click(); };
    emailInput.addEventListener('keydown', handleEnter);
    passwordInput.addEventListener('keydown', handleEnter);

    // Remember email
    const rememberedEmail = localStorage.getItem('phoenix_remembered_email');
    if (rememberedEmail) {
      emailInput.value = rememberedEmail;
      rememberCheck.checked = true;
    }

    // Google Sign-In placeholder
    document.getElementById('googleBtn').addEventListener('click', () => {
      showError('Google Sign-In is not available yet.');
    });
  })();
</script>
</body>
</html>

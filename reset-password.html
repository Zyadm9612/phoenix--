<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Phoenix · Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* نفس الستايلات السابقة (مع إضافة متغيرات القوة) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg: #f9f9f9; --surface: #ffffff; --text-primary: #1e1e2f; --text-secondary: #4a4a5e;
            --accent-1: #ff8a4c; --accent-2: #ff6b2b; --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
            --border-light: #ddd; --shadow: 0 10px 30px rgba(0,0,0,0.05); --glow: rgba(255,110,64,0.4);
            --input-bg: #ffffff; --card-bg: #ffffff; --navbar-bg: rgba(255,255,255,0.9);
            --error-color: #e53e3e; --success-color: #38a169; --weak-color: #e53e3e;
            --medium-color: #fbbf24; --strong-color: #38a169; --requirement-met: #38a169; --requirement-unmet: #a0aec0;
        }
        body.dark {
            --bg: #12121a; --surface: #1e1e2a; --text-primary: #f0f0fa; --text-secondary: #b0b0c0;
            --accent-1: #ff9f6e; --accent-2: #ff7b3f; --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
            --border-light: #3a3a4a; --shadow: 0 10px 30px rgba(0,0,0,0.4); --glow: rgba(255,140,80,0.5);
            --input-bg: #252533; --card-bg: #1e1e2a; --navbar-bg: rgba(30,30,42,0.9);
            --error-color: #fc8181; --success-color: #68d391; --weak-color: #fc8181;
            --medium-color: #fbbf24; --strong-color: #68d391; --requirement-met: #68d391; --requirement-unmet: #718096;
        }
        body { background-color: var(--bg); color: var(--text-primary); line-height: 1.5; transition: background-color 0.3s, color 0.2s; min-height: 100vh; display: flex; flex-direction: column; }
        .nav-mini { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--navbar-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); }
        .logo-area { display: flex; align-items: center; gap: 0.5rem; }
        .logo-area img { height: 52px; width: auto; border-radius: 12px; }
        .logo-text h2 { font-size: 1.5rem; font-weight: 700; background: var(--gradient); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .logo-text span { font-size: 0.8rem; color: var(--text-secondary); }
        .nav-right { display: flex; gap: 1.5rem; }
        .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.3rem; cursor: pointer; }
        .container { display: flex; flex: 1; align-items: center; justify-content: center; padding: 2rem; }
        .card { max-width: 480px; width: 100%; background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-light); padding: 2.5rem 2rem; }
        .card h3 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card .subhead { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1rem; }
        .input-field { margin-bottom: 1.5rem; }
        .input-field label { display: block; margin-bottom: 0.3rem; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 15px; font-size: 1rem; color: var(--text-primary); transition: all 0.2s; height: 52px; }
        .input-wrapper input:focus { outline: none; border-color: var(--accent-1); box-shadow: 0 0 0 3px var(--glow); }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .password-toggle:hover { color: var(--accent-1); }
        .error-message { color: var(--error-color); font-size: 0.8rem; margin-top: 0.3rem; margin-left: 0.5rem; min-height: 1.2rem; }
        .strength-meter { margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .strength-bar { height: 6px; width: 80px; background-color: var(--border-light); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background-color 0.3s; border-radius: 10px; }
        .strength-text { font-size: 0.8rem; color: var(--text-secondary); }
        .password-requirements { margin-top: 0.75rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem 1rem; font-size: 0.8rem; }
        .requirement { display: flex; align-items: center; gap: 0.3rem; color: var(--requirement-unmet); transition: color 0.2s; }
        .requirement i { font-size: 0.7rem; width: 1rem; }
        .requirement.met { color: var(--requirement-met); }
        .btn-primary { width: 100%; background: var(--gradient); color: white; border: none; padding: 0.9rem; border-radius: 15px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.25s; box-shadow: 0 4px 14px var(--glow); margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 25px var(--glow); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .spinner { width: 1.2rem; height: 1.2rem; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { text-align: center; color: var(--text-secondary); }
        .back-link a { color: var(--accent-1); font-weight: 500; text-decoration: none; }
        .footer-note { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: var(--text-secondary); }
        .message { background: var(--surface); border: 1px solid var(--border-light); border-radius: 15px; padding: 1rem; margin-top: 1rem; text-align: center; display: none; }
        .message.success { display: block; background: rgba(46,204,113,0.1); color: var(--success-color); border-color: var(--success-color); }
        .message.error { display: block; background: rgba(229,62,62,0.1); color: var(--error-color); border-color: var(--error-color); }
        @media (max-width: 600px) { .container { padding: 1rem; } .card { padding: 1.8rem 1.2rem; } .nav-mini { padding: 0.8rem 1rem; } .nav-mini .logo-area img { height: 44px; } .nav-mini .logo-text h2 { font-size: 1.3rem; } .nav-mini .logo-text span { font-size: 0.7rem; } .password-requirements { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="nav-mini">
        <div class="logo-area">
            <img src="assets/images/photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
            <div class="logo-text"><h2>Phoenix</h2><span>donate & trade</span></div>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Set New Password</h3>
            <div class="subhead">Enter your new password below.</div>

            <form id="resetForm">
                <div class="input-field">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" placeholder="Create a strong password" required minlength="8">
                        <button type="button" class="password-toggle" id="toggleNewPassword"><i class="far fa-eye-slash"></i></button>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <span class="strength-text" id="strengthText">Enter password</span>
                    </div>
                    <div class="password-requirements" id="passwordRequirements">
                        <div class="requirement" data-requirement="length"><i class="far fa-circle"></i> At least 8 characters</div>
                        <div class="requirement" data-requirement="uppercase"><i class="far fa-circle"></i> One uppercase letter</div>
                        <div class="requirement" data-requirement="lowercase"><i class="far fa-circle"></i> One lowercase letter</div>
                        <div class="requirement" data-requirement="number"><i class="far fa-circle"></i> One number</div>
                        <div class="requirement" data-requirement="special"><i class="far fa-circle"></i> One special character (!@#$%^&*)</div>
                    </div>
                    <div class="error-message" id="newPasswordError"></div>
                </div>

                <div class="input-field">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Re-enter password" required minlength="8">
                        <button type="button" class="password-toggle" id="toggleConfirmPassword"><i class="far fa-eye-slash"></i></button>
                    </div>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="submitText">Reset Password</span>
                    <span id="submitSpinner" class="spinner" style="display: none;"></span>
                </button>
                <div id="message" class="message"></div>
            </form>

            <div class="back-link"><a href="sign.html">← Back to Sign In</a></div>
            <div class="footer-note">Phoenix Exchange System © 2026</div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- Dark Mode ----------
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = themeToggle.querySelector('i');
            function applyTheme(isDark) {
                document.body.classList.toggle('dark', isDark);
                themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('phoenix-theme', isDark ? 'dark' : 'light');
            }
            applyTheme(localStorage.getItem('phoenix-theme') === 'dark');
            themeToggle.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));

            // ---------- API Configuration ----------
            const API_BASE_URL = 'https://backend.com/api';   
            const RESET_PASSWORD_URL = `${API_BASE_URL}/auth/reset-password`;

            // ---------- Get token from URL ----------
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('token');
            if (!resetToken) {
                // Try to get from localStorage (if stored from forgot-password)
                const storedEmail = localStorage.getItem('resetEmail');
                if (!storedEmail) {
                    document.getElementById('message').className = 'message error';
                    document.getElementById('message').innerHTML = 'Invalid or missing reset token. Please request a new password reset link.';
                    document.getElementById('submitBtn').disabled = true;
                }
            }

            // ---------- Password strength and validation ----------
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const newPasswordError = document.getElementById('newPasswordError');
            const confirmPasswordError = document.getElementById('confirmPasswordError');
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            const reqLength = document.querySelector('[data-requirement="length"]');
            const reqUppercase = document.querySelector('[data-requirement="uppercase"]');
            const reqLowercase = document.querySelector('[data-requirement="lowercase"]');
            const reqNumber = document.querySelector('[data-requirement="number"]');
            const reqSpecial = document.querySelector('[data-requirement="special"]');

            function checkPasswordStrength(pwd) {
                const hasLength = pwd.length >= 8;
                const hasUpper = /[A-Z]/.test(pwd);
                const hasLower = /[a-z]/.test(pwd);
                const hasNumber = /\d/.test(pwd);
                const hasSpecial = /[!@#$%^&*]/.test(pwd);
                const criteriaCount = [hasLength, hasUpper, hasLower, hasNumber, hasSpecial].filter(Boolean).length;
                const percent = (criteriaCount / 5) * 100;
                let text = '', color = '';
                if (criteriaCount <= 2) { text = 'Weak'; color = 'var(--weak-color)'; }
                else if (criteriaCount <= 3) { text = 'Medium'; color = 'var(--medium-color)'; }
                else if (criteriaCount <= 4) { text = 'Good'; color = '#2ecc71'; }
                else { text = 'Strong'; color = 'var(--strong-color)'; }
                return { percent, text, color, valid: criteriaCount === 5, hasLength, hasUpper, hasLower, hasNumber, hasSpecial };
            }

            function updateRequirement(element, isMet) {
                if (isMet) {
                    element.classList.add('met');
                    element.querySelector('i').classList.remove('fa-circle', 'far');
                    element.querySelector('i').classList.add('fa-check-circle', 'fas');
                } else {
                    element.classList.remove('met');
                    element.querySelector('i').classList.remove('fa-check-circle', 'fas');
                    element.querySelector('i').classList.add('fa-circle', 'far');
                }
            }

            function updatePasswordStrength() {
                const value = newPassword.value;
                const { percent, text, color, hasLength, hasUpper, hasLower, hasNumber, hasSpecial } = checkPasswordStrength(value);
                strengthFill.style.width = percent + '%';
                strengthFill.style.backgroundColor = color;
                strengthText.textContent = text;
                strengthText.style.color = color;
                updateRequirement(reqLength, hasLength);
                updateRequirement(reqUppercase, hasUpper);
                updateRequirement(reqLowercase, hasLower);
                updateRequirement(reqNumber, hasNumber);
                updateRequirement(reqSpecial, hasSpecial);
                if (value.length === 0) {
                    strengthFill.style.width = '0%';
                    strengthText.textContent = 'Enter password';
                }
            }

            function validateNewPassword() {
                const value = newPassword.value;
                if (!value) { newPasswordError.textContent = 'Password is required.'; return false; }
                if (value.length < 8) { newPasswordError.textContent = 'Must be at least 8 characters.'; return false; }
                newPasswordError.textContent = '';
                return true;
            }

            function validateConfirmPassword() {
                const pass = newPassword.value;
                const confirm = confirmPassword.value;
                if (!confirm) { confirmPasswordError.textContent = 'Please confirm your password.'; return false; }
                if (pass !== confirm) { confirmPasswordError.textContent = 'Passwords do not match.'; return false; }
                confirmPasswordError.textContent = '';
                return true;
            }

            newPassword.addEventListener('input', () => {
                validateNewPassword();
                updatePasswordStrength();
                if (confirmPassword.value) validateConfirmPassword();
            });
            confirmPassword.addEventListener('input', validateConfirmPassword);

            // Password toggle
            function setupToggle(toggleBtn, inputField) {
                toggleBtn.addEventListener('click', () => {
                    const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputField.setAttribute('type', type);
                    const icon = toggleBtn.querySelector('i');
                    if (type === 'password') { icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
                    else { icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
                });
            }
            setupToggle(document.getElementById('toggleNewPassword'), newPassword);
            setupToggle(document.getElementById('toggleConfirmPassword'), confirmPassword);

            // ---------- Submit form ----------
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');
            const messageDiv = document.getElementById('message');

            document.getElementById('resetForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!validateNewPassword() || !validateConfirmPassword()) return;

                const token = resetToken || localStorage.getItem('resetToken'); // fallback
                if (!token) {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = 'Missing reset token. Please request a new password reset link.';
                    return;
                }

                submitBtn.disabled = true;
                submitText.textContent = 'Resetting...';
                submitSpinner.style.display = 'inline-block';
                messageDiv.style.display = 'none';

                try {
                    const response = await fetch(RESET_PASSWORD_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, newPassword: newPassword.value })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message || 'Failed to reset password');

                    // Success
                    localStorage.removeItem('resetEmail');
                    localStorage.removeItem('resetToken');
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = 'Password reset successfully! Redirecting to sign in...';
                    setTimeout(() => { window.location.href = 'sign.html'; }, 2000);
                } catch (err) {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = err.message;
                } finally {
                    submitBtn.disabled = false;
                    submitText.textContent = 'Reset Password';
                    submitSpinner.style.display = 'none';
                }
            });

            updatePasswordStrength();
        })();
    </script>
</body>
</html>
